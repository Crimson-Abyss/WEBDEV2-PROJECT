<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Pastil-an Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="https://img.icons8.com/color/96/rice-bowl.png" alt="Logo">
        <span class="brand-text"><span class="red">Pastil</span>-<span class="green">an</span></span>
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar-nav">
        <a href="admin-menu.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          Menu Management
        </a>
        <a href="admin-orders.html" class="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Orders
        </a>
        <a href="admin-reports.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h2>Dashboard</h2>
        <div class="admin-topbar-right">
          <button class="notification">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <div class="admin-user">
            <div class="avatar">A</div>
            <span>Admin</span>
          </div>
        </div>
      </div>

      <div class="admin-content">
        <div class="admin-card">
          <div class="admin-card-header">
            <h3>Pending Orders</h3>
          </div>

          <div class="order-list">
            <div class="order-item">
              <div class="order-item-left">
                <h4>Juan Dela Cruz</h4>
                <p>Order #1 • 10:30 AM</p>
              </div>
              <div class="order-item-right">
                <div class="price">₱235.00</div>
                <div class="items">2 Items</div>
              </div>
            </div>
            <div class="order-item">
              <div class="order-item-left">
                <h4>Maria Santos</h4>
                <p>Order #2 • 11:15 AM</p>
              </div>
              <div class="order-item-right">
                <div class="price">₱305.00</div>
                <div class="items">1 Item</div>
              </div>
            </div>
            <div class="order-item">
              <div class="order-item-left">
                <h4>Pedro Reyes</h4>
                <p>Order #3 • 12:05 PM</p>
              </div>
              <div class="order-item-right">
                <div class="price">₱245.00</div>
                <div class="items">2 Items</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
